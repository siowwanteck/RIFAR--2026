<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FIaaS - Flood Intelligence as a Service</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/node_modules/maplibre-gl/dist/maplibre-gl.css">
    <link rel="stylesheet" href="/src/styles/dashboard.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Primary"></aside>

      <main class="workspace">
        <header class="topbar" id="topbar"></header>
        <section id="kpi-row" class="kpi-row" aria-label="Flood intelligence summary"></section>

        <section class="operations-grid">
          <article class="panel map-panel" id="map-panel"></article>

          <aside class="right-stack">
            <article class="panel" id="forecast-panel"></article>
            <article class="panel" id="recommendations-panel"></article>
            <article class="panel" id="alerts-panel"></article>
          </aside>
        </section>

        <section class="bottom-grid">
          <article class="panel" id="sensor-panel"></article>
          <article class="panel" id="affected-panel"></article>
          <article class="panel" id="status-panel"></article>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/node_modules/maplibre-gl/dist/maplibre-gl.js"></script>
    <script src="/node_modules/lucide/dist/umd/lucide.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
